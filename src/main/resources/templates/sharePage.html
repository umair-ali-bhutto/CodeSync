        /* -------------------- Global -------------------- */
        :root {
            --bg-light: #f5f5f5;
            --bg-dark: #1e1e2f;
            --text-light: #111;
            --text-dark: #f0f0f0;

            color: var(--text-light);
            display: flex;

            height: 100vh;
            transition: background-color var(--transition-speed), color var(--transition-speed);
        }

        /* -------------------- Header -------------------- */
        header {

            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1rem;
            background-color: var(--editor-bg-light);
            box-shadow: 0 2px 5px var(--shadow);

        }

        header .left {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .logo {
            width: 150px;
            height: 32px;
            background-color: var(--accent);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #fff;
            user-select: none;
        }

        .api-name {
            font-weight: 500;
            font-size: 1rem;
        }

        header .right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .toggle {
            cursor: pointer;
            width: 50px;
            height: 24px;
            background: #ccc;
            border-radius: 12px;
            position: relative;
            transition: background var(--transition-speed);
        }

        .toggle::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            transition: transform var(--transition-speed);
        }

        .toggle.active {
            background: var(--accent);
        }

        .toggle.active::before {
            transform: translateX(26px);
        }

        /* Loader */
        .loader {
            border: 3px solid rgba(0, 0, 0, 0.2);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            opacity: 0;
            transition: opacity var(--transition-speed);
        }

        .loader.active {

        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* -------------------- Editor -------------------- */

        }

        /* -------------------- Dark Mode -------------------- */

<script>
/* -------------------- Dark/Light Mode -------------------- */
const toggle = document.getElementById('mode-toggle');
toggle.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    toggle.classList.toggle('active');
});

/* -------------------- Loader -------------------- */
const loader = document.getElementById('loader');
function showLoader() { loader.classList.add('active'); }
function hideLoader() { loader.classList.remove('active'); }

/* -------------------- Editor & Auto Save -------------------- */
const editor = document.getElementById("editor");
const shareKey = "[[${shareKey}]]";
const apiUrl = "/codesync/api/share/" + shareKey;

let debounceTimer;
let lastContent = "";
let userTyping = false;

/* Initial load */
showLoader();
fetch(apiUrl)
    .then(r => r.text())
    .then(t => {
        editor.value = t;
        lastContent = t;
    })
    .catch(console.error)
    .finally(hideLoader);

/* Auto-save (debounced) */
editor.addEventListener("input", function () {
    userTyping = true;
    clearTimeout(debounceTimer);

    debounceTimer = setTimeout(() => {
        showLoader();
        fetch(apiUrl, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: editor.value
        }).then(() => { lastContent = editor.value; })
          .catch(err => console.error("Save failed:", err))
          .finally(() => { userTyping = false; hideLoader(); });
    }, 1000);
});
</script>

<script>
/* -------------------- NORMAL POLLING -------------------- */
let pollInProgress = false;
let pollTimer = null;

function poll() {
	 if (userTyping || pollInProgress) {
	        pollTimer = setTimeout(poll, 3000);
	        return;
	  }
	 

    pollInProgress = true;
    showLoader();

    fetch(apiUrl)
        .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
        .then(t => { if (t !== lastContent) { editor.value = t; lastContent = t; } })
        .catch(err => console.error("Polling error:", err))
        .finally(() => { pollInProgress = false; hideLoader(); pollTimer = setTimeout(poll, 3000); });
}
poll();
</script>

    <script>
        /* -------------------- Share URL -------------------- */
        const shareBtn = document.getElementById("share-btn");
        const shareUrl = window.location.origin + "/codesync/share/" + shareKey;

        function copyTextFallback(text) {
            const tempInput = document.createElement("textarea");
            tempInput.value = text;
            tempInput.style.position = "fixed"; // prevent scroll jump
            tempInput.style.opacity = "0";
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
        }

        shareBtn.addEventListener("click", async () => {
            try {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(shareUrl);
                } else {
                    copyTextFallback(shareUrl);
                }

                shareBtn.textContent = "✅ Copied!";
                setTimeout(() => shareBtn.textContent = "🔗 Share", 1500);

            } catch (err) {
                console.error("Clipboard failed:", err);
                alert("Copy failed. Please copy manually:\n" + shareUrl);
            }
        });
    </script>

<script>
/* -------------------- Copy Editor Text -------------------- */
const copyTextBtn = document.getElementById("copy-text-btn");

copyTextBtn.addEventListener("click", async () => {
    const textToCopy = editor.value;

    if (!textToCopy) {
        alert("Nothing to copy!");
        return;
    }

    try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(textToCopy);
        } else {
            copyTextFallback(textToCopy);
        }

        copyTextBtn.textContent = "✅ Copied!";
        setTimeout(() => copyTextBtn.textContent = "📋 Copy Text", 1500);

    } catch (err) {
        console.error("Clipboard failed:", err);
        alert("Copy failed. Please copy manually.");
    }
});
</script>

<script>
/* -------------------- Clear Editor Text -------------------- */
const clearBtn = document.getElementById("clear-text-btn");

clearBtn.addEventListener("click", async () => {
    if (!editor.value.trim()) return;

    const confirmClear = confirm("Are you sure you want to clear the text?");
    if (!confirmClear) return;

    try {
        // 🔥 THIS IS THE MAGIC LINE
        clearTimeout(pollTimer);
        
    	pollInProgress = true;
        showLoader();

        // 2️⃣ Save EMPTY content to server
        await fetch(apiUrl, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: ""
        });
        
        // 1️⃣ Clear locally
        editor.value = "";

        // 3️⃣ Update memory so poll won't restore
        lastContent = "";

        clearBtn.textContent = "✅ Cleared!";
        setTimeout(() => clearBtn.textContent = "🧹 Clear", 1500);

    } catch (err) {
        console.error("Clear failed:", err);
        alert("Failed to clear on server.");
    } finally {
        hideLoader();
        pollInProgress = false;
        poll();   // restart fresh polling cycle
    }
});
</script>
