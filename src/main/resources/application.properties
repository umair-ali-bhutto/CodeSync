spring.application.name=CodeSync
server.servlet.context-path=/codesync
server.port=8082

#MSSSQL MY LOCAL
spring.datasource.url=jdbc:sqlserver://localhost;databaseName=db
spring.datasource.username=user
spring.datasource.password=pass
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect

# JPA/Hibernate settings
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=INFO

#logging.level.org.springframework.security=DEBUG



# Comma-separated blocked IPs
security.blocked-ips=103.121.40.46

# Rate limit config
security.rate.limit.capacity=100
security.rate.limit.refill.seconds=1
security.rate.limit.to.refill=1



# ============================================
# Security Configuration
# ============================================

# Default admin credentials (change these in production!)
dashboard.admin.username=${CODESYNC_DASHBOARD_ADMIN_NAME:admin}
dashboard.admin.password=${CODESYNC_DASHBOARD_ADMIN_PASS:abc123+}

# Optional: Additional user credentials
dashboard.user.username=${CODESYNC_DASHBOARD_USER_NAME:umair.ali}
dashboard.user.password=${CODESYNC_DASHBOARD_USER_PASS:abc123+}



# ============================================
# Session Configuration
# ============================================

# Session cookie configuration
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
# Set to true in production with HTTPS:
# server.servlet.session.cookie.secure=true

# Session timeout (in seconds)
server.servlet.session.timeout=1800


# ============================================
# ACTUATOR
# ============================================
# Expose the endpoints you want (or '*' for all)
management.endpoints.web.exposure.include=health,info,metrics,env
# Show full health details (otherwise it just says "UP")
management.endpoint.health.show-details=always





